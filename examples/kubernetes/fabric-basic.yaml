apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-fabric
spec:
  # Keep a single writer for the world PVC during rollout.
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: mc-fabric
  template:
    metadata:
      labels:
        app: mc-fabric
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: minecraft
          image: ghcr.io/alexandergg-0520/minecraft-server:runtime-jre21
          env:
            - name: EULA
              value: "true"
            - name: TYPE
              value: "fabric"
            - name: VERSION
              value: "1.21.1"
            - name: ENABLE_RCON
              value: "true"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-rcon
                  key: password
          ports:
            - containerPort: 25565
          lifecycle:
            preStop:
              exec:
                command: ["/entrypoint.sh", "rcon-stop"]
          readinessProbe:
            exec:
              command: ["test", "-f", "/data/.ready"]
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              memory: "4Gi"
              cpu: "2"
            requests:
              memory: "2Gi"
              cpu: "1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minecraft-data
