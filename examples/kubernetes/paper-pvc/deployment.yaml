apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-paper
  namespace: minecraft-paper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minecraft-paper
  template:
    metadata:
      labels:
        app: minecraft-paper
    spec:
      # tini forwards TERM to the entrypoint, which performs the single RCON-aware shutdown path.
      terminationGracePeriodSeconds: 240
      containers:
        - name: minecraft
          image: ghcr.io/alexandergg-0520/minecraft-server:runtime-jre21
          imagePullPolicy: Always
          ports:
            - name: minecraft
              containerPort: 25565
              protocol: TCP
          env:
            - name: EULA
              value: "true"
            - name: TYPE
              value: paper
            - name: VERSION
              value: "1.21.11"
            - name: ENABLE_RCON
              value: "true"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-rcon
                  key: password
          readinessProbe:
            exec:
              command: ["test", "-f", "/data/.ready"]
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minecraft-data
