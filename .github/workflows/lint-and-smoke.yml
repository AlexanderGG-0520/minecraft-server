name: Lint and Static Smoke

on:
  push:
    branches: [ main ]
  pull_request: {}

permissions:
  contents: read

jobs:
  lint:
    name: Bash syntax and ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck jq unzip

      - name: Bash syntax check
        run: |
          shopt -s nullglob
          lib_scripts=(scripts/lib/*.sh)
          test_scripts=(test/*.sh)
          test "${#lib_scripts[@]}" -gt 0
          test "${#test_scripts[@]}" -gt 0
          bash -n entrypoint.sh
          for script in "${lib_scripts[@]}"; do
            bash -n "$script"
          done
          for script in "${test_scripts[@]}"; do
            bash -n "$script"
          done

      - name: ShellCheck shell scripts
        run: |
          shopt -s nullglob
          lib_scripts=(scripts/lib/*.sh)
          test_scripts=(test/*.sh)
          test "${#lib_scripts[@]}" -gt 0
          test "${#test_scripts[@]}" -gt 0
          shellcheck -x -s bash entrypoint.sh "${lib_scripts[@]}" "${test_scripts[@]}"

      - name: Source library smoke
        run: |
          set -euo pipefail
          source ./scripts/lib/logging.sh
          source ./scripts/lib/filesystem.sh
          source ./scripts/lib/runtime.sh
          source ./scripts/lib/preflight.sh
          source ./scripts/lib/runtime_env.sh
          source ./scripts/lib/c2me.sh
          source ./scripts/lib/jvm_args.sh
          source ./scripts/lib/player_lists.sh
          source ./scripts/lib/paper_config.sh
          source ./scripts/lib/world_paths.sh
          source ./scripts/lib/bootstrap_files.sh
          source ./scripts/lib/lifecycle.sh
          source ./scripts/lib/rcon.sh
          source ./scripts/lib/shutdown.sh
          source ./scripts/lib/s3_client.sh
          source ./scripts/lib/content_assets.sh
          source ./scripts/lib/mods.sh
          source ./scripts/lib/velocity_config.sh
          source ./scripts/lib/server_install.sh
          source ./scripts/lib/runtime_launch.sh
          source ./scripts/lib/world_install.sh
          source ./scripts/lib/world_paths.sh
          source ./scripts/lib/world_reset.sh
          source ./scripts/lib/server_properties.sh
          source ./scripts/lib/install_phase.sh
          source ./scripts/lib/command_mode.sh
          source ./scripts/lib/runtime_phase.sh
          declare -F log >/dev/null
          declare -F safe_rm_f >/dev/null
          declare -F safe_rm_rf >/dev/null
          declare -F safe_mv >/dev/null
          declare -F safe_mv_f >/dev/null
          declare -F is_auto_type >/dev/null
          declare -F is_supported_runtime_type >/dev/null
          declare -F uses_server_properties >/dev/null
          declare -F server_install_marker >/dev/null
          declare -F read_server_install_marker_field >/dev/null
          declare -F assert_server_install_matches >/dev/null
          declare -F write_server_install_marker >/dev/null
          declare -F resolve_type_auto >/dev/null
          declare -F preflight >/dev/null
          declare -F detect_runtime_env >/dev/null
          declare -F should_enable_c2me >/dev/null
          declare -F detect_optimize_mod >/dev/null
          declare -F has_c2me_mod >/dev/null
          declare -F install_c2me_jvm_args >/dev/null
          declare -F detect_gpu >/dev/null
          declare -F configure_c2me_opencl >/dev/null
          declare -F install_jvm_args >/dev/null
          declare -F player_list_uuid_cache_file >/dev/null
          declare -F init_uuid_cache >/dev/null
          declare -F uuid_for_player >/dev/null
          declare -F parse_csv >/dev/null
          declare -F uuid_with_hyphen >/dev/null
          declare -F install_ops >/dev/null
          declare -F install_whitelist >/dev/null
          declare -F require_yq >/dev/null
          declare -F set_server_properties_kv >/dev/null
          declare -F yq_set_yaml >/dev/null
          declare -F apply_paper_override_item >/dev/null
          declare -F configure_paper_configs >/dev/null
          declare -F yaml_escape_dq >/dev/null
          declare -F apply_paper_global_from_env >/dev/null
          declare -F minecraft_world_name >/dev/null
          declare -F minecraft_world_dir >/dev/null
          declare -F install_dirs >/dev/null
          declare -F install_eula >/dev/null
          declare -F setup_server_icon >/dev/null
          declare -F run_phase_hooks >/dev/null
          declare -F rcon_client >/dev/null
          declare -F rcon_exec >/dev/null
          declare -F rcon_say >/dev/null
          declare -F rcon_tellraw_all >/dev/null
          declare -F rcon_stop >/dev/null
          declare -F acquire_rcon_stop_lock >/dev/null
          declare -F cleanup_rcon_lock_on_boot >/dev/null
          declare -F rcon_stop_once >/dev/null
          declare -F wait_for_server_exit >/dev/null
          declare -F require_s3_env >/dev/null
          declare -F configure_mc_alias >/dev/null
          declare -F ensure_s3_source_nonempty_for_remove >/dev/null
          declare -F activate_dir >/dev/null
          declare -F install_configs >/dev/null
          declare -F activate_configs >/dev/null
          declare -F install_plugins >/dev/null
          declare -F activate_plugins >/dev/null
          declare -F install_datapacks >/dev/null
          declare -F activate_datapacks >/dev/null
          declare -F install_resourcepacks >/dev/null
          declare -F activate_resourcepacks >/dev/null
          declare -F install_mods >/dev/null
          declare -F activate_mods >/dev/null
          declare -F extract_mrpack_index >/dev/null
          declare -F validate_modrinth_index >/dev/null
          declare -F safe_modpack_path >/dev/null
          declare -F select_modrinth_server_files >/dev/null
          declare -F modpack_install_marker >/dev/null
          declare -F modpack_file_hash_matches >/dev/null
          declare -F modpack_marker_has_file >/dev/null
          declare -F download_modpack_file >/dev/null
          declare -F verify_modpack_file >/dev/null
          declare -F install_modpack_file >/dev/null
          declare -F write_modpack_marker >/dev/null
          declare -F modpack_marker_matches >/dev/null
          declare -F install_modrinth_mrpack >/dev/null
          declare -F install_modpack >/dev/null
          declare -F generate_velocity_toml >/dev/null
          declare -F download_file_atomic >/dev/null
          declare -F download_vanilla_server_atomic >/dev/null
          declare -F install_vanilla_server_artifact >/dev/null
          declare -F install_fabric_server_artifact >/dev/null
          declare -F install_quilt_server_artifact >/dev/null
          declare -F install_forge_server_artifact >/dev/null
          declare -F install_neoforge_server_artifact >/dev/null
          declare -F install_paper_server_artifact >/dev/null
          declare -F install_purpur_server_artifact >/dev/null
          declare -F install_mohist_server_artifact >/dev/null
          declare -F install_taiyitist_server_artifact >/dev/null
          declare -F install_youer_server_artifact >/dev/null
          declare -F install_spigot_server_artifact >/dev/null
          declare -F install_velocity_server_artifact >/dev/null
          declare -F install_server >/dev/null
          declare -F run_server >/dev/null
          declare -F runtime >/dev/null
          declare -F validate_world_install_paths >/dev/null
          declare -F install_world >/dev/null
          declare -F validate_world_reset_flag_path >/dev/null
          declare -F validate_world_reset_paths >/dev/null
          declare -F reset_world >/dev/null
          declare -F handle_reset_world_flag >/dev/null
          declare -F ensure_server_properties >/dev/null
          declare -F bootstrap_server_properties >/dev/null
          declare -F install >/dev/null
          declare -F handle_command_mode >/dev/null
          declare -F run_runtime_phase >/dev/null

      - name: Filesystem safety smoke
        run: test/filesystem-safety-smoke.sh

      - name: Command mode smoke
        run: test/command-mode-smoke.sh

      - name: Runtime phase smoke
        run: test/runtime-phase-smoke.sh

      - name: Runtime environment smoke
        run: test/runtime-env-smoke.sh

      - name: Fabric loader version smoke
        run: test/fabric-loader-version-smoke.sh

      - name: C2ME helper smoke
        run: test/c2me-smoke.sh

      - name: JVM args smoke
        run: test/jvm-args-smoke.sh

      - name: Player list users smoke
        run: test/player-list-users-smoke.sh

      - name: Server properties TYPE smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          source ./scripts/lib/logging.sh
          source ./scripts/lib/filesystem.sh
          source ./scripts/lib/runtime.sh
          source ./scripts/lib/server_properties.sh

          DATA_DIR="$tmp/data"
          mkdir -p "$DATA_DIR"
          unset TYPE

          output="$(ensure_server_properties 2>&1)"
          printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[INFO\] TYPE= does not use server.properties, skipping bootstrap$'
          test ! -f "$DATA_DIR/server.properties"

          set +e
          output="$(bootstrap_server_properties 2>&1)"
          status=$?
          set -e
          test "$status" -eq 1
          printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[ERROR\] bootstrap_server_properties: unsupported TYPE=$'

      - name: Server properties bootstrap diff smoke
        run: test/server-properties-bootstrap-diff-smoke.sh

      - name: Runtime launch message smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          is_true() {
            value="$(printf '%s' "${1:-}" | tr '[:upper:]' '[:lower:]')"
            case "$value" in
              true|1|yes|y|on) return 0 ;;
              *) return 1 ;;
            esac
          }

          source ./scripts/lib/logging.sh
          source ./scripts/lib/filesystem.sh
          source ./scripts/lib/lifecycle.sh
          source ./scripts/lib/runtime_launch.sh

          TYPE=forge
          DATA_DIR="$tmp/data"
          JVM_ARGS_FILE="$DATA_DIR/jvm.args"
          HOOKS_ENABLED=false
          HOOKS_DIR="$tmp/hooks"
          mkdir -p "$DATA_DIR"

          set +e
          output="$(runtime 2>&1)"
          status=$?
          set -e
          test "$status" -eq 1
          printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[ERROR\] forge runtime not installed \(run.sh missing\)$'
          ! printf '%s\n' "$output" | grep -F 'NeoForge runtime not installed'

      - name: S3 client temp cleanup smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          mkdir -p "$tmp/bin" "$tmp/s3tmp"
          cat > "$tmp/bin/mc" <<'EOF'
          #!/usr/bin/env bash
          test "$1" = "find"
          test "$3" = "--print"
          test "$4" = "{}"
          case "${MC_MODE:-success}" in
            success) printf '%s\n' "${2%/}/remote.jar" ;;
            empty) exit 0 ;;
            fail) exit 7 ;;
            *) exit 99 ;;
          esac
          EOF
          test "$(head -n 1 "$tmp/bin/mc")" = "#!/usr/bin/env bash"
          chmod +x "$tmp/bin/mc"

          source ./scripts/lib/logging.sh
          source ./scripts/lib/filesystem.sh
          source ./scripts/lib/s3_client.sh

          PATH="$tmp/bin:$PATH"
          TMPDIR="$tmp/s3tmp"
          export TMPDIR

          assert_s3_tmp_empty() {
            ! find "$TMPDIR" -mindepth 1 -print -quit | grep -q .
          }

          MC_MODE=success ensure_s3_source_nonempty_for_remove "s3/bucket/prefix" "mods"
          assert_s3_tmp_empty

          set +e
          output="$(MC_MODE=fail ensure_s3_source_nonempty_for_remove "s3/bucket/prefix" "mods" 2>&1)"
          status=$?
          set -e
          test "$status" -eq 1
          printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[ERROR\] Failed to list mods source before remove sync: s3/bucket/prefix$'
          assert_s3_tmp_empty

          set +e
          output="$(MC_MODE=empty ensure_s3_source_nonempty_for_remove "s3/bucket/prefix" "mods" 2>&1)"
          status=$?
          set -e
          test "$status" -eq 1
          printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[ERROR\] mods remove_extra requested but S3 source is empty: s3/bucket/prefix$'
          assert_s3_tmp_empty

      - name: World install temp archive smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          mkdir -p "$tmp/bin"
          cat > "$tmp/bin/mc" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          case "$1" in
            ls)
              test "$2" = "--json"
              test "$3" = "s3/bucket/world/"
              printf '%s\n' '{"type":"file","key":"world.zip"}'
              ;;
            cp)
              test "$2" = "s3/bucket/world/world.zip"
              printf '%s\n' "$3" > "$TMP_ARCHIVE_TARGET"
              case "${MC_MODE:-success}" in
                success) cp "$WORLD_FIXTURE_ZIP" "$3" ;;
                fail) : > "$3"; exit 7 ;;
                invalid) printf '%s\n' "not a zip" > "$3" ;;
                *) exit 99 ;;
              esac
              ;;
            *)
              exit 99
              ;;
          esac
          EOF
          chmod +x "$tmp/bin/mc"

          create_fixture_zip() {
            local name="$1"
            shift
            WORLD_FIXTURE_ZIP="$tmp/${name}.zip"
            export WORLD_FIXTURE_ZIP
            python3 - "$WORLD_FIXTURE_ZIP" "$@" <<'PY'
          import sys
          import zipfile

          with zipfile.ZipFile(sys.argv[1], "w") as zf:
              for entry in sys.argv[2:]:
                  zf.writestr(entry, "fixture")
          PY
          }

          snapshot_world_install_temps() {
            find /tmp -maxdepth 1 \( -name 'world.*.zip' -o -name 'world-extract.*' \) -print | sort
          }

          assert_world_install_temps_unchanged() {
            diff -u "$WORLD_TEMP_SNAPSHOT" <(snapshot_world_install_temps)
            test ! -e /tmp/world.zip
          }

          assert_archive_cleaned() {
            local archive_target
            archive_target="$(cat "$TMP_ARCHIVE_TARGET")"
            case "$archive_target" in
              /tmp/world.*.zip) ;;
              *) echo "unexpected temp archive path: $archive_target" >&2; exit 1 ;;
            esac
            test "$archive_target" != "/tmp/world.zip"
            test ! -e "$archive_target"
          }

          run_success_case() {
            local name="$1"
            shift
            create_fixture_zip "$name" "$@"
            DATA_DIR="$tmp/data-$name"
            mkdir -p "$DATA_DIR"
            touch "$DATA_DIR/reset-world.flag"

            install_world

            test -f "$DATA_DIR/world/level.dat"
            test ! -f "$DATA_DIR/reset-world.flag"
            assert_archive_cleaned
            assert_world_install_temps_unchanged
          }

          run_failure_case() {
            local name="$1"
            local expected_message="$2"
            shift 2
            create_fixture_zip "$name" "$@"
            DATA_DIR="$tmp/data-$name"
            mkdir -p "$DATA_DIR/world"
            printf '%s\n' old-world > "$DATA_DIR/world/level.dat"
            touch "$DATA_DIR/reset-world.flag"

            set +e
            output="$(install_world 2>&1)"
            status=$?
            set -e

            test "$status" -eq 1
            printf '%s\n' "$output" | grep -E "^\[[^]]+\] \[ERROR\] ${expected_message}$"
            test -f "$DATA_DIR/reset-world.flag"
            test "$(cat "$DATA_DIR/world/level.dat")" = "old-world"
            assert_archive_cleaned
            assert_world_install_temps_unchanged
          }

          run_path_validation_failure_case() {
            local name="$1"
            local data_dir="$2"
            local expected_message="$3"

            create_fixture_zip "$name" world/level.dat
            DATA_DIR="$data_dir"

            set +e
            output="$(install_world 2>&1)"
            status=$?
            set -e

            test "$status" -eq 1
            printf '%s\n' "$output" | grep -E "^\[[^]]+\] \[ERROR\] ${expected_message}$"
            assert_archive_cleaned
            assert_world_install_temps_unchanged
          }

          run_unset_data_dir_validation_failure_case() {
            create_fixture_zip unset-data-dir world/level.dat
            unset DATA_DIR

            set +e
            output="$(install_world 2>&1)"
            status=$?
            set -e

            test "$status" -eq 1
            printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[ERROR\] DATA_DIR is required for world install$'
            assert_archive_cleaned
            assert_world_install_temps_unchanged
          }

          assert_path_validation_failure() {
            local expected_message="$1"
            shift

            set +e
            output="$(validate_world_install_paths "$@" 2>&1)"
            status=$?
            set -e

            test "$status" -eq 1
            printf '%s\n' "$output" | grep -E "^\[[^]]+\] \[ERROR\] ${expected_message}$"
          }

          source ./scripts/lib/logging.sh
          source ./scripts/lib/filesystem.sh
          source ./scripts/lib/world_install.sh
          configure_mc_alias() {
            test "$1" = "world"
          }

          PATH="$tmp/bin:$PATH"
          WORLDS_ENABLED=true
          WORLDS_S3_BUCKET=bucket
          WORLDS_S3_PREFIX=world
          TMP_ARCHIVE_TARGET="$tmp/archive-target.txt"
          export TMP_ARCHIVE_TARGET
          WORLD_TEMP_SNAPSHOT="$tmp/world-temp-snapshot.txt"
          snapshot_world_install_temps > "$WORLD_TEMP_SNAPSHOT"
          test ! -e /tmp/world.zip

          valid_path_data="$tmp/path-valid"
          validate_world_install_paths "$valid_path_data" "$valid_path_data/world"
          assert_path_validation_failure "DATA_DIR is required for world install" "" "/world"
          assert_path_validation_failure "Refusing unsafe world install path" "relative-data" "relative-data/world"
          assert_path_validation_failure "Refusing unsafe world install path" "$valid_path_data" ""
          assert_path_validation_failure "Refusing unsafe world install path" "/" "//world"
          assert_path_validation_failure "Refusing unsafe world install path" "$valid_path_data" "$valid_path_data"
          assert_path_validation_failure "Refusing unsafe world install path" "$valid_path_data" "$tmp/outside/world"

          run_success_case direct-world world/level.dat
          run_success_case single-root MyWorld/level.dat
          run_success_case flat-root level.dat

          run_failure_case no-level "Failed to detect world directory in archive" notes.txt
          run_failure_case multiple-candidates "Ambiguous world archive layout" world/level.dat MyWorld/level.dat
          run_failure_case nested-only "Failed to detect world directory in archive" backups/world/level.dat

          run_path_validation_failure_case empty-data-dir "" "DATA_DIR is required for world install"
          run_unset_data_dir_validation_failure_case

          create_fixture_zip relative-data-dir world/level.dat
          (
            cd "$tmp"
            DATA_DIR="relative-data"
            mkdir -p "$DATA_DIR/world"
            printf '%s\n' old-world > "$DATA_DIR/world/level.dat"
            touch "$DATA_DIR/reset-world.flag"

            set +e
            output="$(install_world 2>&1)"
            status=$?
            set -e

            test "$status" -eq 1
            printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[ERROR\] Refusing unsafe world install path$'
            test -f "$DATA_DIR/reset-world.flag"
            test "$(cat "$DATA_DIR/world/level.dat")" = "old-world"
            assert_archive_cleaned
            assert_world_install_temps_unchanged
          )

          DATA_DIR="$tmp/download-fail"
          mkdir -p "$DATA_DIR/world"
          printf '%s\n' old-world > "$DATA_DIR/world/level.dat"
          touch "$DATA_DIR/reset-world.flag"
          set +e
          output="$(MC_MODE=fail install_world 2>&1)"
          status=$?
          set -e
          test "$status" -eq 1
          printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[ERROR\] Failed to download world archive$'
          test -f "$DATA_DIR/reset-world.flag"
          test "$(cat "$DATA_DIR/world/level.dat")" = "old-world"
          assert_archive_cleaned
          assert_world_install_temps_unchanged

          DATA_DIR="$tmp/unzip-fail"
          mkdir -p "$DATA_DIR/world"
          printf '%s\n' old-world > "$DATA_DIR/world/level.dat"
          touch "$DATA_DIR/reset-world.flag"
          set +e
          output="$(MC_MODE=invalid install_world 2>&1)"
          status=$?
          set -e
          test "$status" -eq 1
          printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[ERROR\] Failed to extract world archive with unzip$'
          test -f "$DATA_DIR/reset-world.flag"
          test "$(cat "$DATA_DIR/world/level.dat")" = "old-world"
          assert_archive_cleaned
          assert_world_install_temps_unchanged

      - name: Logging helper smoke
        run: |
          set -euo pipefail
          source ./scripts/lib/logging.sh

          output="$(log INFO hello world 2>&1)"
          printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[INFO\] hello world$'

          set +e
          output="$(die single message 2>&1)"
          status=$?
          set -e
          test "$status" -eq 1
          printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[ERROR\] single message$'

          set +e
          output="$(die foo bar baz 2>&1)"
          status=$?
          set -e
          test "$status" -eq 1
          printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[ERROR\] foo bar baz$'

      - name: World reset helper smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          source ./scripts/lib/logging.sh
          source ./scripts/lib/filesystem.sh
          source ./scripts/lib/world_reset.sh

          assert_reset_path_validation_failure() {
            local expected_message="$1"
            shift

            set +e
            output="$(validate_world_reset_paths "$@" 2>&1)"
            status=$?
            set -e

            test "$status" -eq 1
            printf '%s\n' "$output" | grep -E "^\[[^]]+\] \[ERROR\] ${expected_message}$"
          }

          assert_reset_flag_validation_failure() {
            local expected_message="$1"
            shift

            set +e
            output="$(validate_world_reset_flag_path "$@" 2>&1)"
            status=$?
            set -e

            test "$status" -eq 1
            printf '%s\n' "$output" | grep -E "^\[[^]]+\] \[ERROR\] ${expected_message}$"
          }

          valid_data="$tmp/path-valid"
          validate_world_reset_flag_path "$valid_data" "$valid_data/reset-world.flag"
          validate_world_reset_paths \
            "$valid_data" \
            "$valid_data/world" \
            "$valid_data/reset-world.flag" \
            "$valid_data/backups" \
            "$valid_data/backups/world-20260101-000000.tar.gz" \
            "$valid_data/mods" \
            false \
            true
          validate_world_reset_paths \
            "$valid_data" \
            "$valid_data/world" \
            "$valid_data/reset-world.flag" \
            "$valid_data/backups" \
            "" \
            "$valid_data/mods" \
            false \
            false
          validate_world_reset_paths \
            "$valid_data" \
            "$valid_data/world" \
            "$valid_data/reset-world.flag" \
            "$valid_data/backups" \
            "$valid_data/backups/world-20260101-000000.tar.gz" \
            "$valid_data/mods" \
            true \
            true

          assert_reset_flag_validation_failure "DATA_DIR is required for world reset" "" "/reset-world.flag"
          assert_reset_flag_validation_failure "Refusing unsafe reset flag path" "relative-data" "relative-data/reset-world.flag"
          assert_reset_flag_validation_failure "Refusing unsafe reset flag path" "$valid_data" ""
          assert_reset_flag_validation_failure "Refusing unsafe reset flag path" "$valid_data" "$tmp/outside/reset-world.flag"
          assert_reset_flag_validation_failure "Refusing unsafe reset flag path" "$valid_data" "$valid_data"

          assert_reset_path_validation_failure "DATA_DIR is required for world reset" "" "/world" "/reset-world.flag" "/backups" "/backups/world.tar.gz" "/mods" false true
          assert_reset_path_validation_failure "Refusing unsafe world reset path" "relative-data" "relative-data/world" "relative-data/reset-world.flag" "relative-data/backups" "relative-data/backups/world.tar.gz" "relative-data/mods" false true
          assert_reset_path_validation_failure "Refusing unsafe world reset path" "$valid_data" "" "$valid_data/reset-world.flag" "$valid_data/backups" "$valid_data/backups/world.tar.gz" "$valid_data/mods" false true
          assert_reset_path_validation_failure "Refusing unsafe world reset path" "$valid_data" "$tmp/outside/world" "$valid_data/reset-world.flag" "$valid_data/backups" "$valid_data/backups/world.tar.gz" "$valid_data/mods" false true
          assert_reset_path_validation_failure "Refusing unsafe reset flag path" "$valid_data" "$valid_data/world" "$tmp/outside/reset-world.flag" "$valid_data/backups" "$valid_data/backups/world.tar.gz" "$valid_data/mods" false true
          assert_reset_path_validation_failure "Refusing unsafe world reset path" "$valid_data" "$valid_data/world" "$valid_data/reset-world.flag" "$tmp/outside/backups" "$tmp/outside/backups/world.tar.gz" "$valid_data/mods" false true
          assert_reset_path_validation_failure "Refusing unsafe world reset path" "$valid_data" "$valid_data/world" "$valid_data/reset-world.flag" "$valid_data/backups" "$tmp/outside/world.tar.gz" "$valid_data/mods" false true
          assert_reset_path_validation_failure "Refusing unsafe world reset path" "$valid_data" "$valid_data/world" "$valid_data/reset-world.flag" "$valid_data/backups" "$valid_data/backups/world.tar.gz" "$tmp/outside/mods" true true
          assert_reset_path_validation_failure "Refusing unsafe world reset path" "$valid_data" "$valid_data/world" "$valid_data/reset-world.flag" "$valid_data/backups" "$valid_data/backups/world.tar.gz" "$valid_data/world" true true

          DATA_DIR="$tmp/no-flag"
          mkdir -p "$DATA_DIR/world"
          touch "$DATA_DIR/world/level.dat"
          reset_world
          test -f "$DATA_DIR/world/level.dat"

          DATA_DIR="$tmp/valid-flag"
          mkdir -p "$DATA_DIR/world" "$DATA_DIR/mods"
          touch "$DATA_DIR/world/level.dat" "$DATA_DIR/mods/server-mod.jar" "$DATA_DIR/.ready" "$DATA_DIR/reset-world.flag"
          RESET_WORLD_BACKUP=false
          RESET_WORLD_REMOVE_MODS=false
          handle_reset_world_flag
          test ! -f "$DATA_DIR/reset-world.flag"
          test ! -f "$DATA_DIR/.ready"
          test ! -e "$DATA_DIR/world"
          test ! -f "$DATA_DIR/world/level.dat"
          test -f "$DATA_DIR/mods/server-mod.jar"

          DATA_DIR="$tmp/valid-backup"
          mkdir -p "$DATA_DIR/world" "$DATA_DIR/mods"
          touch "$DATA_DIR/world/level.dat" "$DATA_DIR/mods/server-mod.jar" "$DATA_DIR/.ready" "$DATA_DIR/reset-world.flag"
          RESET_WORLD_BACKUP=true
          RESET_WORLD_REMOVE_MODS=true
          handle_reset_world_flag
          test ! -f "$DATA_DIR/reset-world.flag"
          test ! -f "$DATA_DIR/.ready"
          test ! -e "$DATA_DIR/world"
          test ! -f "$DATA_DIR/world/level.dat"
          test -d "$DATA_DIR/mods"
          test ! -f "$DATA_DIR/mods/server-mod.jar"
          test "$(find "$DATA_DIR/backups" -maxdepth 1 -type f -name 'world-*.tar.gz' | wc -l)" -eq 1

          DATA_DIR="$tmp/expired-flag"
          mkdir -p "$DATA_DIR/world"
          touch "$DATA_DIR/world/level.dat" "$DATA_DIR/reset-world.flag"
          touch -d '1 hour ago' "$DATA_DIR/reset-world.flag"
          handle_reset_world_flag
          test ! -f "$DATA_DIR/reset-world.flag"
          test -f "$DATA_DIR/world/level.dat"

          DATA_DIR="$tmp/expired-flag-no-world"
          mkdir -p "$DATA_DIR"
          touch "$DATA_DIR/reset-world.flag"
          touch -d '1 hour ago' "$DATA_DIR/reset-world.flag"
          handle_reset_world_flag
          test ! -f "$DATA_DIR/reset-world.flag"

          (
            cd "$tmp"
            DATA_DIR="relative-data"
            mkdir -p "$DATA_DIR/world"
            touch "$DATA_DIR/world/level.dat" "$DATA_DIR/reset-world.flag"
            RESET_WORLD_BACKUP=false
            RESET_WORLD_REMOVE_MODS=false

            set +e
            output="$(reset_world 2>&1)"
            status=$?
            set -e

            test "$status" -eq 1
            printf '%s\n' "$output" | grep -E '^\[[^]]+\] \[ERROR\] Refusing unsafe world reset path$'
            test -f "$DATA_DIR/reset-world.flag"
            test -f "$DATA_DIR/world/level.dat"
          )

      - name: Lifecycle hook smoke
        run: |
          set -euo pipefail
          is_true() {
            case "$1" in
              true|1|yes|on) return 0 ;;
              *) return 1 ;;
            esac
          }
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          source ./scripts/lib/logging.sh
          source ./scripts/lib/lifecycle.sh

          HOOKS_DIR="$tmp/hooks"
          HOOK_OUTPUT="$HOOKS_DIR/ran.txt"
          export HOOK_OUTPUT
          mkdir -p "$HOOKS_DIR/pre-install.d"
          cat > "$HOOKS_DIR/pre-install.d/01-write-phase" <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "$HOOK_PHASE" > "$HOOK_OUTPUT"
          EOF
          chmod +x "$HOOKS_DIR/pre-install.d/01-write-phase"

          HOOKS_ENABLED=true
          HOOKS_TIMEOUT_SEC=0
          HOOKS_STRICT=true
          run_phase_hooks pre-install
          test "$(cat "$HOOK_OUTPUT")" = "pre-install"

      - name: RCON stop smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          mkdir -p "$tmp/bin"
          cat > "$tmp/bin/rcon-cli" <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "$*" >> "$TMP_DIR/commands.txt"
          EOF
          chmod +x "$tmp/bin/rcon-cli"

          source ./scripts/lib/logging.sh
          source ./scripts/lib/rcon.sh
          json_escape() {
            local s="$*"
            s="${s//\\/\\\\}"
            s="${s//\"/\\\"}"
            s="${s//$'\n'/\\n}"
            printf '%s' "$s"
          }

          TMP_DIR="$tmp"
          export TMP_DIR
          ENABLE_RCON=true
          RCON_HOST=127.0.0.1
          RCON_PORT=25575
          RCON_PASSWORD=secret
          RCON_TIMEOUT=1
          RCON_RETRIES=1
          RCON_RETRY_DELAY=0
          SHUTDOWN_SAVE_WAIT_SECONDS=0
          PATH="$tmp/bin:$PATH"
          DATA_DIR="$tmp/data"
          mkdir -p "$DATA_DIR/plugins/Citizens"
          touch "$DATA_DIR/plugins/Citizens/saves.yml"
          STOP_SERVER_ANNOUNCE_DELAY=0

          rcon_stop
          test "$(sed -n '1p' "$TMP_DIR/commands.txt")" = "$(printf '%s' '--host 127.0.0.1 --port 25575 --password secret citizens save')"
          test "$(sed -n '2p' "$TMP_DIR/commands.txt")" = "$(printf '%s' '--host 127.0.0.1 --port 25575 --password secret save-all flush')"
          test "$(sed -n '3p' "$TMP_DIR/commands.txt")" = "$(printf '%s' '--host 127.0.0.1 --port 25575 --password secret stop')"

      - name: RCON lock smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          source ./scripts/lib/logging.sh
          source ./scripts/lib/filesystem.sh
          source ./scripts/lib/rcon.sh
          source ./scripts/lib/shutdown.sh

          RCON_STOP_LOCK="$tmp/lock"
          RCON_STOP_IN_PROGRESS=0
          RCON_STOP_RESULT=1

          mkdir -p "$RCON_STOP_LOCK"
          if acquire_rcon_stop_lock; then
            echo "expected acquire_rcon_stop_lock to fail when the lock already exists" >&2
            exit 1
          fi

          cleanup_rcon_lock_on_boot
          test ! -d "$RCON_STOP_LOCK"

          rcon_stop_calls=0
          rcon_stop() {
            rcon_stop_calls=$((rcon_stop_calls + 1))
            return 7
          }

          set +e
          rcon_stop_once
          first_rc=$?
          rcon_stop_once
          second_rc=$?
          set -e

          test "$rcon_stop_calls" -eq 1
          test "$first_rc" -eq 7
          test "$second_rc" -eq 7
          test "$RCON_STOP_RESULT" -eq 7

      - name: Shutdown RCON focused smoke
        run: |
          bash test/shutdown-rcon-smoke.sh

      - name: Wait helper smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          source ./scripts/lib/logging.sh
          source ./scripts/lib/filesystem.sh
          source ./scripts/lib/shutdown.sh

          (
            sleep 1
          ) &
          SERVER_PID=$!
          wait_for_server_exit 5
          test $? -eq 0

          (
            sleep 5
          ) &
          SERVER_PID=$!
          set +e
          wait_for_server_exit 1
          rc=$?
          set -e
          test "$rc" -ne 0
          kill "$SERVER_PID" 2>/dev/null || true
          wait "$SERVER_PID" 2>/dev/null || true

      - name: Modrinth mrpack parser validator skeleton
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          MRPACK_TMP="$tmp" python3 - <<'PY'
          import json
          import os
          import pathlib
          import zipfile

          tmp = pathlib.Path(os.environ["MRPACK_TMP"])
          index = {
              "formatVersion": 1,
              "game": "minecraft",
              "versionId": "test-pack",
              "name": "Test Pack",
              "files": [
                  {
                      "path": "mods/server.jar",
                      "hashes": {"sha1": "a" * 40, "sha512": "b" * 128},
                      "downloads": ["https://example.invalid/server.jar"],
                      "env": {"server": "required", "client": "unsupported"},
                  },
                  {
                      "path": "mods/client.jar",
                      "hashes": {"sha1": "c" * 40, "sha512": "d" * 128},
                      "downloads": ["https://example.invalid/client.jar"],
                      "env": {"server": "unsupported", "client": "required"},
                  },
                  {
                      "path": "mods/optional.jar",
                      "hashes": {"sha1": "e" * 40, "sha512": "f" * 128},
                      "downloads": ["https://example.invalid/optional.jar"],
                      "env": {"server": "optional", "client": "optional"},
                  },
              ],
              "dependencies": {"minecraft": "1.21.1"},
          }
          with zipfile.ZipFile(tmp / "valid.mrpack", "w") as zf:
              zf.writestr("modrinth.index.json", json.dumps(index))
          PY

          __SOURCED=1 source ./entrypoint.sh
          extract_mrpack_index "$tmp/valid.mrpack" "$tmp/index.json"
          validate_modrinth_index "$tmp/index.json"
          select_modrinth_server_files "$tmp/index.json" > "$tmp/files.jsonl"

          test "$(grep -c '^' "$tmp/files.jsonl")" -eq 1
          grep -F '"path":"mods/server.jar"' "$tmp/files.jsonl"
          ! grep -F 'mods/client.jar' "$tmp/files.jsonl"
          ! grep -F 'mods/optional.jar' "$tmp/files.jsonl"

          for bad in "../evil.jar" "/abs.jar" 'C:\evil.jar' "world/level.dat" "server.properties"; do
            set +e
            ( safe_modpack_path "$bad" file ) >/dev/null 2>&1
            status=$?
            set -e
            test "$status" -ne 0
          done

      - name: Runtime auto-resolution smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          source ./scripts/lib/logging.sh
          source ./scripts/lib/filesystem.sh
          source ./scripts/lib/runtime.sh
          DATA_DIR="$tmp"

          test "$(server_install_marker)" = "$tmp/.server-install.json"
          write_server_install_marker "server.jar" "paper" "1.21.8" "123"
          jq -e '.artifact == "server.jar" and .type == "paper" and .version == "1.21.8" and .build == "123"' "$tmp/.server-install.json"
          ! find "$tmp" -maxdepth 1 -name '.server-install.json.tmp.*' -print -quit | grep -q .

          write_server_install_marker "server.jar" "vanilla" "1.21.8"
          jq -e '.artifact == "server.jar" and .type == "vanilla" and .version == "1.21.8" and .build == ""' "$tmp/.server-install.json"
          ! find "$tmp" -maxdepth 1 -name '.server-install.json.tmp.*' -print -quit | grep -q .

          fail_tmp="$(mktemp -d)"
          (
            DATA_DIR="$fail_tmp"
            mv() { return 7; }

            set +e
            write_server_install_marker "server.jar" "paper" "1.21.8" "123"
            status=$?
            set -e
            test "$status" -eq 1
          )
          test ! -f "$fail_tmp/.server-install.json"
          ! find "$fail_tmp" -maxdepth 1 -name '.server-install.json.tmp.*' -print -quit | grep -q .

          write_server_install_marker "server.jar" "paper" "1.21.8" "123"
          assert_server_install_matches "server.jar" "paper" "1.21.8" "123"

          set +e
          ( assert_server_install_matches "server.jar" "vanilla" "1.21.8" "" ) >/dev/null 2>&1
          mismatch_status=$?
          set -e
          test "$mismatch_status" -ne 0

          touch "$tmp/server.jar"
          TYPE=auto
          resolve_type_auto
          test "$TYPE" = "paper"

          rm -f "$tmp/.server-install.json" "$tmp/server.jar"
          touch "$tmp/fabric-server-launch.jar"
          TYPE=AUTO
          resolve_type_auto
          test "$TYPE" = "fabric"

      - name: Runtime marker corrupt JSON smoke
        run: bash test/runtime-marker-corrupt-json-smoke.sh
