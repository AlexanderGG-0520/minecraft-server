name: Lint and Smoke

on:
  push:
    branches: [ main ]
  pull_request: {}


jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck

      - name: Bash syntax check
        run: bash -n entrypoint.sh

      - name: ShellCheck entrypoint.sh
        run: shellcheck -x -s bash entrypoint.sh

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build runtime-jre17 smoke image
        run: |
          # Build a runtime target that executes the Dockerfile stage containing
          # `COPY entrypoint.sh /entrypoint.sh`.
          docker build --progress=plain --target runtime-jre17 -t minecraft-server:smoke .

      - name: Check entrypoint exists in image
        run: docker run --rm --entrypoint test minecraft-server:smoke -f /entrypoint.sh

      - name: Check entrypoint is executable in image
        run: docker run --rm --entrypoint test minecraft-server:smoke -x /entrypoint.sh
