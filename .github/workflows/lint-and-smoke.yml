name: Lint and Static Smoke

on:
  push:
    branches: [ main ]
  pull_request: {}


jobs:
  lint:
    name: Bash syntax and ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck jq unzip

      - name: Bash syntax check
        run: |
          shopt -s nullglob
          lib_scripts=(scripts/lib/*.sh)
          test "${#lib_scripts[@]}" -gt 0
          bash -n entrypoint.sh
          for script in "${lib_scripts[@]}"; do
            bash -n "$script"
          done

      - name: ShellCheck shell scripts
        run: |
          shopt -s nullglob
          lib_scripts=(scripts/lib/*.sh)
          test "${#lib_scripts[@]}" -gt 0
          shellcheck -x -s bash entrypoint.sh "${lib_scripts[@]}"

      - name: Source library smoke
        run: |
          set -euo pipefail
          source ./scripts/lib/logging.sh
          source ./scripts/lib/runtime.sh
          source ./scripts/lib/lifecycle.sh
          source ./scripts/lib/rcon.sh
          source ./scripts/lib/shutdown.sh
          source ./scripts/lib/s3_client.sh
          source ./scripts/lib/velocity_config.sh
          source ./scripts/lib/server_install.sh
          source ./scripts/lib/runtime_launch.sh
          source ./scripts/lib/world_install.sh
          source ./scripts/lib/world_reset.sh
          source ./scripts/lib/server_properties.sh
          declare -F log >/dev/null
          declare -F is_auto_type >/dev/null
          declare -F is_supported_runtime_type >/dev/null
          declare -F uses_server_properties >/dev/null
          declare -F server_install_marker >/dev/null
          declare -F assert_server_install_matches >/dev/null
          declare -F write_server_install_marker >/dev/null
          declare -F resolve_type_auto >/dev/null
          declare -F run_phase_hooks >/dev/null
          declare -F rcon_client >/dev/null
          declare -F rcon_exec >/dev/null
          declare -F rcon_say >/dev/null
          declare -F rcon_tellraw_all >/dev/null
          declare -F rcon_stop >/dev/null
          declare -F acquire_rcon_stop_lock >/dev/null
          declare -F cleanup_rcon_lock_on_boot >/dev/null
          declare -F rcon_stop_once >/dev/null
          declare -F wait_for_server_exit >/dev/null
          declare -F require_s3_env >/dev/null
          declare -F configure_mc_alias >/dev/null
          declare -F ensure_s3_source_nonempty_for_remove >/dev/null
          declare -F generate_velocity_toml >/dev/null
          declare -F download_file_atomic >/dev/null
          declare -F download_vanilla_server_atomic >/dev/null
          declare -F install_vanilla_server_artifact >/dev/null
          declare -F install_fabric_server_artifact >/dev/null
          declare -F install_quilt_server_artifact >/dev/null
          declare -F install_forge_server_artifact >/dev/null
          declare -F install_neoforge_server_artifact >/dev/null
          declare -F install_paper_server_artifact >/dev/null
          declare -F install_purpur_server_artifact >/dev/null
          declare -F install_mohist_server_artifact >/dev/null
          declare -F install_taiyitist_server_artifact >/dev/null
          declare -F install_youer_server_artifact >/dev/null
          declare -F install_spigot_server_artifact >/dev/null
          declare -F install_velocity_server_artifact >/dev/null
          declare -F install_server >/dev/null
          declare -F run_server >/dev/null
          declare -F runtime >/dev/null
          declare -F install_world >/dev/null
          declare -F reset_world >/dev/null
          declare -F handle_reset_world_flag >/dev/null
          declare -F ensure_server_properties >/dev/null
          declare -F bootstrap_server_properties >/dev/null

      - name: World reset helper smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          source ./scripts/lib/logging.sh
          source ./scripts/lib/world_reset.sh

          DATA_DIR="$tmp/no-flag"
          mkdir -p "$DATA_DIR/world"
          touch "$DATA_DIR/world/level.dat"
          reset_world
          test -f "$DATA_DIR/world/level.dat"

          DATA_DIR="$tmp/valid-flag"
          mkdir -p "$DATA_DIR/world" "$DATA_DIR/mods"
          touch "$DATA_DIR/world/level.dat" "$DATA_DIR/mods/server-mod.jar" "$DATA_DIR/.ready" "$DATA_DIR/reset-world.flag"
          RESET_WORLD_BACKUP=false
          RESET_WORLD_REMOVE_MODS=false
          handle_reset_world_flag
          test ! -f "$DATA_DIR/reset-world.flag"
          test ! -f "$DATA_DIR/.ready"
          test -d "$DATA_DIR/world"
          test ! -f "$DATA_DIR/world/level.dat"
          test -f "$DATA_DIR/mods/server-mod.jar"

          DATA_DIR="$tmp/expired-flag"
          mkdir -p "$DATA_DIR/world"
          touch "$DATA_DIR/world/level.dat" "$DATA_DIR/reset-world.flag"
          touch -d '1 hour ago' "$DATA_DIR/reset-world.flag"
          handle_reset_world_flag
          test ! -f "$DATA_DIR/reset-world.flag"
          test -f "$DATA_DIR/world/level.dat"

      - name: Lifecycle hook smoke
        run: |
          set -euo pipefail
          is_true() {
            case "$1" in
              true|1|yes|on) return 0 ;;
              *) return 1 ;;
            esac
          }
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          source ./scripts/lib/logging.sh
          source ./scripts/lib/lifecycle.sh

          HOOKS_DIR="$tmp/hooks"
          HOOK_OUTPUT="$HOOKS_DIR/ran.txt"
          export HOOK_OUTPUT
          mkdir -p "$HOOKS_DIR/pre-install.d"
          cat > "$HOOKS_DIR/pre-install.d/01-write-phase" <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "$HOOK_PHASE" > "$HOOK_OUTPUT"
          EOF
          chmod +x "$HOOKS_DIR/pre-install.d/01-write-phase"

          HOOKS_ENABLED=true
          HOOKS_TIMEOUT_SEC=0
          HOOKS_STRICT=true
          run_phase_hooks pre-install
          test "$(cat "$HOOK_OUTPUT")" = "pre-install"

      - name: RCON stop smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          mkdir -p "$tmp/bin"
          cat > "$tmp/bin/rcon-cli" <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "$*" >> "$TMP_DIR/commands.txt"
          EOF
          chmod +x "$tmp/bin/rcon-cli"

          source ./scripts/lib/logging.sh
          source ./scripts/lib/rcon.sh
          json_escape() {
            local s="$*"
            s="${s//\\/\\\\}"
            s="${s//\"/\\\"}"
            s="${s//$'\n'/\\n}"
            printf '%s' "$s"
          }

          TMP_DIR="$tmp"
          export TMP_DIR
          ENABLE_RCON=true
          RCON_HOST=127.0.0.1
          RCON_PORT=25575
          RCON_PASSWORD=secret
          RCON_TIMEOUT=1
          RCON_RETRIES=1
          RCON_RETRY_DELAY=0
          PATH="$tmp/bin:$PATH"
          DATA_DIR="$tmp/data"
          mkdir -p "$DATA_DIR/plugins/Citizens"
          touch "$DATA_DIR/plugins/Citizens/saves.yml"
          STOP_SERVER_ANNOUNCE_DELAY=0

          rcon_stop
          test "$(sed -n '1p' "$TMP_DIR/commands.txt")" = "$(printf '%s' '--host 127.0.0.1 --port 25575 --password secret tellraw @a {"text":"Server shutting down now.","color":"yellow"}')"
          test "$(sed -n '2p' "$TMP_DIR/commands.txt")" = "$(printf '%s' '--host 127.0.0.1 --port 25575 --password secret citizens save')"
          test "$(sed -n '3p' "$TMP_DIR/commands.txt")" = "$(printf '%s' '--host 127.0.0.1 --port 25575 --password secret save-all')"
          test "$(sed -n '4p' "$TMP_DIR/commands.txt")" = "$(printf '%s' '--host 127.0.0.1 --port 25575 --password secret stop')"

      - name: RCON lock smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          source ./scripts/lib/logging.sh
          source ./scripts/lib/rcon.sh
          source ./scripts/lib/shutdown.sh

          RCON_STOP_LOCK="$tmp/lock"
          RCON_STOP_IN_PROGRESS=0
          RCON_STOP_RESULT=1

          mkdir -p "$RCON_STOP_LOCK"
          if acquire_rcon_stop_lock; then
            echo "expected acquire_rcon_stop_lock to fail when the lock already exists" >&2
            exit 1
          fi

          cleanup_rcon_lock_on_boot
          test ! -d "$RCON_STOP_LOCK"

          rcon_stop_calls=0
          rcon_stop() {
            rcon_stop_calls=$((rcon_stop_calls + 1))
            return 7
          }

          set +e
          rcon_stop_once
          first_rc=$?
          rcon_stop_once
          second_rc=$?
          set -e

          test "$rcon_stop_calls" -eq 1
          test "$first_rc" -eq 7
          test "$second_rc" -eq 7
          test "$RCON_STOP_RESULT" -eq 7

      - name: Wait helper smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          source ./scripts/lib/logging.sh
          source ./scripts/lib/shutdown.sh

          (
            sleep 1
          ) &
          SERVER_PID=$!
          wait_for_server_exit 5
          test $? -eq 0

          (
            sleep 5
          ) &
          SERVER_PID=$!
          set +e
          wait_for_server_exit 1
          rc=$?
          set -e
          test "$rc" -ne 0
          kill "$SERVER_PID" 2>/dev/null || true
          wait "$SERVER_PID" 2>/dev/null || true

      - name: Modrinth mrpack parser validator skeleton
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          MRPACK_TMP="$tmp" python3 - <<'PY'
          import json
          import os
          import pathlib
          import zipfile

          tmp = pathlib.Path(os.environ["MRPACK_TMP"])
          index = {
              "formatVersion": 1,
              "game": "minecraft",
              "versionId": "test-pack",
              "name": "Test Pack",
              "files": [
                  {
                      "path": "mods/server.jar",
                      "hashes": {"sha1": "a" * 40, "sha512": "b" * 128},
                      "downloads": ["https://example.invalid/server.jar"],
                      "env": {"server": "required", "client": "unsupported"},
                  },
                  {
                      "path": "mods/client.jar",
                      "hashes": {"sha1": "c" * 40, "sha512": "d" * 128},
                      "downloads": ["https://example.invalid/client.jar"],
                      "env": {"server": "unsupported", "client": "required"},
                  },
                  {
                      "path": "mods/optional.jar",
                      "hashes": {"sha1": "e" * 40, "sha512": "f" * 128},
                      "downloads": ["https://example.invalid/optional.jar"],
                      "env": {"server": "optional", "client": "optional"},
                  },
              ],
              "dependencies": {"minecraft": "1.21.1"},
          }
          with zipfile.ZipFile(tmp / "valid.mrpack", "w") as zf:
              zf.writestr("modrinth.index.json", json.dumps(index))
          PY

          __SOURCED=1 source ./entrypoint.sh
          extract_mrpack_index "$tmp/valid.mrpack" "$tmp/index.json"
          validate_modrinth_index "$tmp/index.json"
          select_modrinth_server_files "$tmp/index.json" > "$tmp/files.jsonl"

          test "$(grep -c '^' "$tmp/files.jsonl")" -eq 1
          grep -F '"path":"mods/server.jar"' "$tmp/files.jsonl"
          ! grep -F 'mods/client.jar' "$tmp/files.jsonl"
          ! grep -F 'mods/optional.jar' "$tmp/files.jsonl"

          for bad in "../evil.jar" "/abs.jar" 'C:\evil.jar' "world/level.dat" "server.properties"; do
            set +e
            ( safe_modpack_path "$bad" file ) >/dev/null 2>&1
            status=$?
            set -e
            test "$status" -ne 0
          done

      - name: Runtime auto-resolution smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          source ./scripts/lib/logging.sh
          source ./scripts/lib/runtime.sh
          DATA_DIR="$tmp"

          test "$(server_install_marker)" = "$tmp/.server-install.json"
          write_server_install_marker "server.jar" "paper" "1.21.8" "123"
          jq -e '.artifact == "server.jar" and .type == "paper" and .version == "1.21.8" and .build == "123"' "$tmp/.server-install.json"
          assert_server_install_matches "server.jar" "paper" "1.21.8"

          set +e
          ( assert_server_install_matches "server.jar" "vanilla" "1.21.8" ) >/dev/null 2>&1
          mismatch_status=$?
          set -e
          test "$mismatch_status" -ne 0

          touch "$tmp/server.jar"
          TYPE=auto
          resolve_type_auto
          test "$TYPE" = "paper"

          rm -f "$tmp/.server-install.json" "$tmp/server.jar"
          touch "$tmp/fabric-server-launch.jar"
          TYPE=AUTO
          resolve_type_auto
          test "$TYPE" = "fabric"
