name: Runtime Smoke CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  fabric-26-2-bootstrap-smoke:
    name: Fabric 26.2 bootstrap and restart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Java 25 runtime image
        run: docker build --target runtime-jre25 -t minecraft-server:test-jre25 .

      - name: Bootstrap without creating a world, then start twice
        run: |
          set -euo pipefail
          data="$(mktemp -d)"
          container="minecraft-fabric-26-2-$RANDOM"
          trap 'docker rm -f "$container" >/dev/null 2>&1 || true; sudo rm -rf "$data"' EXIT
          chmod 0777 "$data"

          docker run --rm \
            -v "$data:/data" \
            -e EULA=true \
            -e TYPE=fabric \
            -e VERSION=26.2 \
            -e LEVEL_NAME=custom-world \
            -e ENABLE_RCON=false \
            minecraft-server:test-jre25 install-only

          test -s "$data/server.properties"
          test ! -e "$data/world"
          test ! -e "$data/custom-world/level.dat"

          wait_until_ready() {
            local log_file="$1"
            for _ in $(seq 1 180); do
              docker logs "$container" >"$log_file" 2>&1
              if grep -Eq 'Done \([^)]*\)!' "$log_file"; then
                return 0
              fi
              if ! docker inspect -f '{{.State.Running}}' "$container" | grep -Fx true >/dev/null; then
                cat "$log_file"
                return 1
              fi
              sleep 1
            done
            cat "$log_file"
            return 1
          }

          docker run -d --name "$container" \
            -v "$data:/data" \
            -e EULA=true \
            -e TYPE=fabric \
            -e VERSION=26.2 \
            -e LEVEL_NAME=custom-world \
            -e ENABLE_RCON=false \
            minecraft-server:test-jre25
          wait_until_ready "$data/first-start.log"
          docker stop -t 30 "$container"
          docker rm "$container"

          test -s "$data/custom-world/level.dat"
          test -s "$data/custom-world/data/minecraft/world_gen_settings.dat"

          docker run -d --name "$container" \
            -v "$data:/data" \
            -e EULA=true \
            -e TYPE=fabric \
            -e VERSION=26.2 \
            -e LEVEL_NAME=custom-world \
            -e ENABLE_RCON=false \
            minecraft-server:test-jre25
          wait_until_ready "$data/restart.log"
          ! grep -F 'Overworld settings missing' "$data/restart.log"
          docker stop -t 30 "$container"

  runtime-smoke:
    name: Runtime behavior regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build runtime image
        run: docker build --target runtime-jre21 -t minecraft-server:test-jre21 .

      - name: Check entrypoint image sanity
        run: |
          docker run --rm --entrypoint test minecraft-server:test-jre21 -f /entrypoint.sh
          docker run --rm --entrypoint test minecraft-server:test-jre21 -x /entrypoint.sh

      - name: Check entrypoint syntax in image
        run: docker run --rm --entrypoint bash minecraft-server:test-jre21 -n /entrypoint.sh

      - name: Check sourced libraries in image
        run: |
          docker run --rm --entrypoint bash minecraft-server:test-jre21 -lc '
            set -euo pipefail
            source /scripts/lib/logging.sh
            source /scripts/lib/filesystem.sh
            source /scripts/lib/numeric_validation.sh
