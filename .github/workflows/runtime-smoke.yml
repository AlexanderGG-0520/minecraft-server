            declare -F s3_prepare_env >/dev/null
            declare -F configure_s3_client >/dev/null
            declare -F s3_cp >/dev/null
            declare -F s3_sync >/dev/null
            declare -F s3_list_paths >/dev/null
            declare -F ensure_s3_source_nonempty_for_remove >/dev/null
            declare -F activate_dir >/dev/null
            declare -F install_configs >/dev/null
            declare -F activate_configs >/dev/null
