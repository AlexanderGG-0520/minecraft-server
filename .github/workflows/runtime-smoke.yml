            declare -F run_phase_hooks >/dev/null
            declare -F rcon_client >/dev/null
            declare -F rcon_exec >/dev/null
            declare -F rcon_say >/dev/null
            declare -F rcon_tellraw_all >/dev/null
            declare -F rcon_stop >/dev/null
