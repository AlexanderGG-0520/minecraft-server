            source /scripts/lib/mods.sh
            source /scripts/lib/velocity_config.sh
            source /scripts/lib/server_install.sh
            source /scripts/lib/runtime_launch.sh
            source /scripts/lib/world_install.sh
            source /scripts/lib/world_reset.sh
            source /scripts/lib/server_properties.sh
            source /scripts/lib/install_phase.sh
            source /scripts/lib/command_mode.sh
            source /scripts/lib/runtime_phase.sh
            declare -F log >/dev/null
            declare -F safe_rm_f >/dev/null
            declare -F safe_rm_rf >/dev/null
            declare -F safe_mv >/dev/null
            declare -F safe_mv_f >/dev/null
            declare -F is_safe_nonnegative_integer >/dev/null
            declare -F is_safe_positive_integer >/dev/null
            declare -F validate_shutdown_numeric_value >/dev/null
            declare -F validate_shutdown_numeric_config >/dev/null
            declare -F shutdown_graceful_budget_seconds >/dev/null
            declare -F shutdown_recommended_grace_seconds >/dev/null
            declare -F is_auto_type >/dev/null
            declare -F is_supported_runtime_type >/dev/null
            declare -F uses_server_properties >/dev/null
            declare -F server_install_marker >/dev/null
            declare -F assert_server_install_matches >/dev/null
            declare -F write_server_install_marker >/dev/null
            declare -F resolve_type_auto >/dev/null
            declare -F preflight >/dev/null
            declare -F detect_runtime_env >/dev/null
            declare -F should_enable_c2me >/dev/null
            declare -F detect_optimize_mod >/dev/null
            declare -F has_c2me_mod >/dev/null
            declare -F install_c2me_jvm_args >/dev/null
            declare -F detect_gpu >/dev/null
            declare -F configure_c2me_opencl >/dev/null
            declare -F install_jvm_args >/dev/null
            declare -F player_list_uuid_cache_file >/dev/null
            declare -F init_uuid_cache >/dev/null
            declare -F uuid_for_player >/dev/null
            declare -F parse_csv >/dev/null
            declare -F uuid_with_hyphen >/dev/null
            declare -F install_ops >/dev/null
            declare -F install_whitelist >/dev/null
            declare -F require_yq >/dev/null
            declare -F set_server_properties_kv >/dev/null
            declare -F yq_set_yaml >/dev/null
            declare -F apply_paper_override_item >/dev/null
            declare -F configure_paper_configs >/dev/null
            declare -F yaml_escape_dq >/dev/null
            declare -F apply_paper_global_from_env >/dev/null
            declare -F minecraft_world_name >/dev/null
            declare -F minecraft_world_dir >/dev/null
            declare -F install_dirs >/dev/null
            declare -F install_eula >/dev/null
