            source /scripts/lib/runtime.sh
            source /scripts/lib/preflight.sh
            source /scripts/lib/runtime_env.sh
            source /scripts/lib/c2me.sh
            source /scripts/lib/jvm_args.sh
            source /scripts/lib/player_lists.sh
            source /scripts/lib/paper_config.sh
            source /scripts/lib/world_paths.sh
            source /scripts/lib/bootstrap_files.sh
            source /scripts/lib/lifecycle.sh
            source /scripts/lib/rcon.sh
            source /scripts/lib/shutdown.sh
            source /scripts/lib/s3_client.sh
