name: Publish Docker Images to GHCR

on:
    workflow_dispatch:
    push:
        branches:
        - main
        tags:
        - v*

jobs:
    publish:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        strategy:
            fail-fast: false
            matrix:
                target:
                - runtime-jre8
                - runtime-jre11
                - runtime-jre17
                - runtime-jre21
                - runtime-jre25
                - runtime-jre25-gpu

        steps:
        -   name: Checkout
            uses: actions/checkout@v6

        # -----------------------------------
        # Docker Buildx
        # -----------------------------------
        -   name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v4

        # -----------------------------------
        # Login to GHCR
        # -----------------------------------
        -   name: Login to GHCR
            uses: docker/login-action@v4
            with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

        # -----------------------------------
        # Login to Docker Hub
        # -----------------------------------
        -   name: Login to Docker Hub
            uses: docker/login-action@v4
            with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

        # -----------------------------------
        # Image tags
        # -----------------------------------
        -   name: Prepare image tags
            id: image-tags
            run: |
                tags="ghcr.io/alexandergg-0520/minecraft-server:${{ matrix.target }}"
                tags="$tags
                alecjp02/minecraft-server:${{ matrix.target }}"

                if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                    tags="$tags
                    ghcr.io/alexandergg-0520/minecraft-server:${GITHUB_REF_NAME}-${{ matrix.target }}"
                    tags="$tags
                    alecjp02/minecraft-server:${GITHUB_REF_NAME}-${{ matrix.target }}"
                fi

                {
                    echo 'tags<<EOF'
                    echo "$tags"
                    echo EOF
                } >> "$GITHUB_OUTPUT"

        # -----------------------------------
        # Build & Push
        # -----------------------------------
        -   name: Build & Push (${{ matrix.target }})
            uses: docker/build-push-action@v7
            with:
                context: .
                file: ./Dockerfile
                target: ${{ matrix.target }}
                push: true

                pull: true

                # cache
                cache-from: type=gha
                cache-to: type=gha,mode=max

                tags: ${{ steps.image-tags.outputs.tags }}

                # Supply chain attestations
                sbom: true
                provenance: mode=max
