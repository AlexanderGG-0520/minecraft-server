name: Publish Docker Images to GHCR

on:
    workflow_dispatch:
        inputs:
            release_tag:
                description: Optional existing release tag to backfill versioned image tags, for example v0.1.0
                required: false
                type: string
    push:
        branches:
        - main
        tags:
        - v*

jobs:
    publish:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        strategy:
            fail-fast: false
            matrix:
                target:
                - runtime-jre8
                - runtime-jre11
                - runtime-jre17
                - runtime-jre21
                - runtime-jre25
                - runtime-jre25-gpu

        steps:
        -   name: Checkout
            uses: actions/checkout@v6

        # -----------------------------------
        # Docker Buildx
        # -----------------------------------
        -   name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v4

        # -----------------------------------
        # Login to GHCR
        # -----------------------------------
        -   name: Login to GHCR
            uses: docker/login-action@v4
            with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

        # -----------------------------------
        # Login to Docker Hub
        # -----------------------------------
        -   name: Login to Docker Hub
            uses: docker/login-action@v4
            with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

        # -----------------------------------
        # Image tags
        # -----------------------------------
        -   name: Prepare image tags
            id: image-tags
            env:
                RELEASE_TAG: ${{ inputs.release_tag || '' }}
            run: |
                if [[ -n "${RELEASE_TAG}" && ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
                    echo "Invalid release_tag: ${RELEASE_TAG}" >&2
                    exit 1
                fi

                version_tag=""
                if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                    version_tag="${GITHUB_REF_NAME}"
                elif [[ -n "${RELEASE_TAG}" ]]; then
                    version_tag="${RELEASE_TAG}"
                fi

                {
                    echo 'tags<<EOF'
                    printf '%s\n' "ghcr.io/alexandergg-0520/minecraft-server:${{ matrix.target }}"
                    printf '%s\n' "alecjp02/minecraft-server:${{ matrix.target }}"

                    if [[ -n "${version_tag}" ]]; then
                        printf '%s\n' "ghcr.io/alexandergg-0520/minecraft-server:${version_tag}-${{ matrix.target }}"
                        printf '%s\n' "alecjp02/minecraft-server:${version_tag}-${{ matrix.target }}"
                    fi

                    echo EOF
                } >> "$GITHUB_OUTPUT"

        # -----------------------------------
        # Build & Push
        # -----------------------------------
        -   name: Build & Push (${{ matrix.target }})
            uses: docker/build-push-action@v7
            with:
                context: .
                file: ./Dockerfile
                target: ${{ matrix.target }}
                push: true

                pull: true

                # cache
                cache-from: type=gha
                cache-to: type=gha,mode=max

                tags: ${{ steps.image-tags.outputs.tags }}

                # Supply chain attestations
                sbom: true
                provenance: mode=max
